<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — Halaman Tidak Ditemukan | DELY</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0d1b2a;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;}
    .wrap{text-align:center;padding:40px;}
    .num{font-family:'Playfair Display',serif;font-size:clamp(80px,15vw,160px);font-weight:900;color:#c0392b;line-height:1;margin-bottom:16px;}
    .globe{font-size:48px;margin-bottom:20px;display:block;animation:spin 6s linear infinite;}
    @keyframes spin{from{transform:rotate(-5deg)}50%{transform:rotate(5deg)}to{transform:rotate(-5deg)}}
    h2{font-family:'Playfair Display',serif;font-size:24px;color:#fff;margin-bottom:12px;}
    p{font-size:13px;color:rgba(255,255,255,.35);letter-spacing:1px;margin-bottom:32px;}
    a{display:inline-block;background:#c0392b;color:#fff;text-decoration:none;padding:12px 24px;font-size:13px;letter-spacing:2px;text-transform:uppercase;transition:all .2s;}
    a:hover{background:#a93226;}
  </style>
</head>
<body>
  <div class="wrap">
    <span class="globe">🌐</span>
    <div class="num">404</div>
    <h2>Halaman Tidak Ditemukan</h2>
    <p>Halaman yang Anda cari tidak ada atau sudah dipindahkan.</p>
    <a href="/index.html">← Kembali ke Beranda</a>
  </div>
</body>
</html>
